LicensingTerms="Using my project for commercial purposes is allowed. The license text is available on Patreon or (https://drive.google.com/file/d/1YiyXH-uVsNLdVH4E2GbJDvvQ__CdKKmG/view?usp=drive_link) . Additionally, below I’ve included extra notes that may help clarify certain points that might be ambiguous after reading the license document.Is it necessary to credit me as a contributor to your game?Generally, no. I’m not directly involved in your game’s development, so I don’t believe there’s any requirement to include me in the game credits.However, if you’re crediting other creators whose content you use in your game (e.g. assets from FAB) as contributors, then you’re also welcome to include me. 🙂That part is entirely up to you.My full name is Jakub Woś.If you prefer to credit only your team members, that’s perfectly fine — you can leave me out.What if multiple people are working with AGLS?That’s something I didn’t explain clearly before. If only one person gained access to the project through Patreon, and then others work on that same copy, there are currently no restrictions.Whether your team has 2 or 10 members — everyone involved in the development of the game can work with the project.I do plan to change this in the future, especially since game studios have started showing interest in my work. If I do introduce changes, it might look something like: for teams of more than 5 people, the scope of use would need to be discussed individually.For now, though, there is no such restriction — so feel free to continue developing your game. Just remember not to send project files to anyone not directly involved in your production.Still, if you appreciate my work, you can let others on your team know about potentially supporting my work via a Patreon subscription, even if they won’t actively be using the latest version 🙂. What did I mean by stating: \"Keep in mind that the Project contains custom implementations of various mechanics that are protected by copyright law\"?Well, there could be a situation where someone using AGLS studies how certain mechanics are implemented on a technical level — for example, ledge detection for the climbing system, algorithms for generating additional AI navigation data, and other features, mostly written in C++. These types of algorithms are my own original solutions to specific problems, and the chance that someone else would create them in the exact same way is extremely low. That’s why I’d prefer to avoid a situation where someone extracts parts of the project’s code and sells them as their own solution. In your case, this restriction does not apply, since you’re planning to create a game, not distribute Unreal Engine project files."
